<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            user-select: none;
        }

        body {
            /* background-color: #7cb518; */
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("https://images.unsplash.com/photo-1539622106114-e0df812097e6?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8Z3JlZW58ZW58MHx8MHx8fDA%3D");
            background-size: cover;
            color: white;
        }

        .container {
            height: 500px;
            width: 75%;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-direction: row;
            row-gap: 70px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 3px 1px 2px black;
            border-top-right-radius: 50px;
            border-bottom-right-radius: 50px;
        }

        .form {
            height: 500px;
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

        }

        form {
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            height: 500px;
            width: 50%;
            background-color: #02DB9A;
            margin-left: 100px;
            border-top-right-radius: 50px;
            border-bottom-right-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .inp {
            height: 30px;
            width: 230px;
            text-align: center;
            /* font-weight:bolder; */
            border-radius: 10px;
            border: none;
            outline: none;
            /* background-color: rgba(255, 255, 255, 1); */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(5px);
        }

        .btn {
            height: 27px;
            width: 230px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .msg h2{
            border-bottom: 3px solid white;
        }
        .msg p{
            margin-top: 20px;
        }
        .checker{
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form">
            <form>
                <input  class="inp" type="text" id="name" placeholder='Enter Your Name'>
                <input  class="inp" type="email" id="email" placeholder="Enter Your Email">
                <input  class="inp" type="password" id="password" placeholder="Enter Your password">
                <div class="checker">
                    <input type="checkbox"  id="confirm">&nbsp;I have read the privacy policy of the company 
                </div>
                <button  type="submit" class="btn">Submit</button>
            </form>
        </div>
        <div class="msg">
            <h2>Welcome To our site</h2>
            <p>login into our website to enjoy our premium features</p>
        </div>
    </div>
</body>
<script>

    const btn = document.querySelector(".btn");
    const form = document.querySelector("form")
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.querySelector("#name").value;
        const email = document.querySelector("#email").value;
        const pass = document.querySelector("#password").value;
        const imp = document.querySelector("#confirm").value
        if (name.length < 2|| name.length ==0 || email.length == 0 || pass.length == 0) {
            alert("please fill the inputs correctly")
             return
            console.log("returned")
        }
        console.log(imp)
    })
</script>

</html>
